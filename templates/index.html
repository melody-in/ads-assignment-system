<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS — Assignment Document System</title>
    <meta name="description" content="ADS — Generate your personalized assignment with one click.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --accent: #818cf8;
        --accent2: #c4b5fd;
        --bg: #04040f;
        --glass: rgba(255,255,255,0.035);
        --border: rgba(255,255,255,0.07);
    }

    body {
        font-family: 'Inter', sans-serif;
        color: #fff;
        background: var(--bg);
        overflow-x: hidden;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
    }

    /* ── CANVAS ─────────────────────────────────────────────────── */
    #waveCanvas {
        position: fixed;
        inset: 0;
        width: 100%; height: 100%;
        z-index: 0;
    }

    /* ── LAYOUT ─────────────────────────────────────────────────── */
    .page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 3rem 1.5rem 5rem;
    }

    /* ── HEADER ─────────────────────────────────────────────────── */
    .header {
        text-align: center;
        margin-bottom: 2.8rem;
        animation: fadeDown 0.9s ease-out;
    }

    .logo {
        font-family: 'Dancing Script', cursive;
        font-size: clamp(3.2rem, 9vw, 6rem);
        font-weight: 700;
        letter-spacing: -0.01em;
        line-height: 1;
        background: linear-gradient(135deg, #e0e7ff 0%, #c4b5fd 40%, #818cf8 70%, #6366f1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px rgba(129,140,248,0.25));
    }

    .sig-header {
        font-family: 'Dancing Script', cursive;
        font-size: clamp(1.4rem, 4vw, 2.5rem);
        font-weight: 600;
        background: linear-gradient(135deg, #7ac5b4, #4169e1, #6b3b5b); /* Opal Green, Royal Blue, Cadbury Silk Maroon */
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-left: 0.8rem;
    }

    .tagline {
        margin-top: 0.9rem;
        font-size: 1.1rem;
        font-weight: 500;
        letter-spacing: 0.12em;
        font-style: italic;
        background: linear-gradient(135deg, #7ac5b4, #4169e1, #6b3b5b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        min-height: 1.5em;
        display: flex;
        align-items: center;
    }
    
    .tagline .cursor {
        display: inline-block;
        width: 2px;
        height: 1.1em;
        background: rgba(65, 105, 225, 0.8);
        margin-left: 4px;
        animation: blink 0.8s step-end infinite;
    }
    
    @keyframes blink { 50% { opacity: 0; } }

    /* ── GLASS CARD ─────────────────────────────────────────────── */
    .card {
        background: var(--glass);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2rem;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.06);
        transition: border-color 0.4s, transform 0.3s;
        animation: fadeUp 0.9s ease-out 0.15s both;
    }

    .card:hover {
        border-color: rgba(129,140,248,0.18);
        transform: translateY(-2px);
    }

    /* ── FORM ───────────────────────────────────────────────────── */
    .form-group { margin-bottom: 1.3rem; }

    .lbl {
        display: block;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.35);
        margin-bottom: 0.4rem;
    }

    .inp {
        width: 100%;
        padding: 0.75rem 0.9rem;
        background: rgba(255,255,255,0.04);
        border: 1.5px solid rgba(255,255,255,0.07);
        border-radius: 11px;
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        outline: none;
        transition: all 0.3s;
    }

    .inp::placeholder { color: rgba(255,255,255,0.15); }

    .inp:focus {
        border-color: rgba(129,140,248,0.45);
        background: rgba(255,255,255,0.06);
        box-shadow: 0 0 0 3px rgba(129,140,248,0.08);
    }

    .inp.err {
        border-color: rgba(248,113,113,0.6);
        box-shadow: 0 0 0 3px rgba(248,113,113,0.08);
    }

    .field-err {
        font-size: 0.72rem;
        color: #f87171;
        margin-top: 0.3rem;
        display: none;
    }
    .inp.err ~ .field-err { display: block; }

    /* ── BUTTON ─────────────────────────────────────────────────── */
    .btn {
        width: 100%;
        padding: 0.85rem;
        border: none;
        border-radius: 11px;
        color: #fff;
        font-family: 'Inter', sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #4f46e5, #6366f1, #818cf8, #a78bfa);
        background-size: 250% 250%;
        animation: btnFlow 5s ease infinite;
        transition: transform 0.25s, box-shadow 0.25s;
    }

    @keyframes btnFlow {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(99,102,241,0.35);
    }
    .btn:active { transform: translateY(0) scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .btn .sp {
        display: none;
        width: 18px; height: 18px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        margin: 0 auto;
    }
    .btn.ld .btn-t { display: none; }
    .btn.ld .sp    { display: block; }

    /* ── RESULT ─────────────────────────────────────────────────── */
    .result {
        width: 100%;
        max-width: 900px;
        margin-top: 2.2rem;
        display: none;
        animation: fadeUp 0.5s ease-out;
    }
    .result.show { display: block; }

    .msg-ok {
        padding: 0.85rem 1.1rem;
        margin-bottom: 1rem;
        background: rgba(129,140,248,0.07);
        border: 1px solid rgba(129,140,248,0.14);
        border-radius: 12px;
        font-size: 0.85rem;
        color: rgba(255,255,255,0.8);
        display: none;
        text-align: center;
    }
    .msg-ok.show { display: block; }
    .msg-ok strong { color: #fff; }
    .msg-ok .det { color: rgba(255,255,255,0.4); font-size: 0.78rem; display: block; margin-top: 0.15rem; }

    .msg-err {
        padding: 0.85rem 1.1rem;
        margin-bottom: 1rem;
        background: rgba(248,113,113,0.07);
        border: 1px solid rgba(248,113,113,0.14);
        border-radius: 12px;
        font-size: 0.85rem;
        color: #f87171;
        display: none;
        text-align: center;
    }
    .msg-err.show { display: block; }

    /* Download button row */
    .actions {
        display: flex;
        justify-content: center;
        margin-bottom: 1.1rem;
    }

    .dl-btn {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.65rem 1.6rem;
        background: rgba(129,140,248,0.08);
        border: 1.5px solid rgba(129,140,248,0.22);
        border-radius: 11px;
        color: #c4b5fd;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s;
    }
    .dl-btn:hover {
        background: rgba(129,140,248,0.15);
        border-color: rgba(129,140,248,0.35);
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(129,140,248,0.15);
    }

    /* PDF preview iframe */
    .preview-box {
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 4px 28px rgba(0,0,0,0.35);
    }

    .preview-bar {
        background: rgba(255,255,255,0.035);
        border-bottom: 1px solid rgba(255,255,255,0.05);
        padding: 0.65rem 1.1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .preview-bar span { font-size: 0.78rem; color: rgba(255,255,255,0.5); font-weight: 500; }
    .preview-bar .badge {
        background: rgba(129,140,248,0.12);
        color: rgba(129,140,248,0.7);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 0.15rem 0.55rem;
        border-radius: 20px;
    }

    .gen-loading {
        display: none;
        padding: 3.5rem;
        text-align: center;
        background: rgba(255,255,255,0.015);
    }
    .gen-loading.show { display: block; }
    .gen-loading .ring {
        width: 34px; height: 34px;
        border: 3px solid rgba(255,255,255,0.07);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        margin: 0 auto 0.7rem;
    }
    .gen-loading p { color: rgba(255,255,255,0.3); font-size: 0.78rem; }

    .pdf-iframe {
        width: 100%;
        height: 680px;
        border: none;
        background: #111;
        display: none;
    }

    /* Removed signature css since it moved to header */

    /* ── ANIMATIONS ─────────────────────────────────────────────── */
    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-18px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 3px; }

    @media (max-width: 600px) {
        .page { padding: 1.5rem 1rem 4rem; }
        .card { padding: 1.5rem; }
        .pdf-iframe { height: 450px; }
    }
    </style>
</head>
<body>

<canvas id="waveCanvas"></canvas>

<div class="page">

    <!-- SVG Heatwave Filter -->
    <svg style="display: none;">
      <filter id="heatwave" x="-100%" y="-100%" width="300%" height="300%">
        <feTurbulence type="fractalNoise" baseFrequency="0.02 0.1" numOctaves="3" result="noise">
          <animate attributeName="baseFrequency" values="0.02 0.1; 0.04 0.2; 0.02 0.1" dur="4s" repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap id="displacement" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>

    <!-- Header -->
    <div class="header">
        <div style="display: flex; align-items: baseline; justify-content: center;">
            <div class="logo">ADS</div>
            <div style="filter: url(#heatwave);">
                <div class="sig-header">by ViR@hitvin</div>
            </div>
        </div>
        <div style="filter: url(#heatwave); display: flex; justify-content: center;">
            <div class="tagline">
                <span id="tagText"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <!-- Form Card -->
    <div class="card" id="formCard">
        <form id="form" autocomplete="off">

            <div class="form-group">
                <label class="lbl" for="sName">Full Name</label>
                <input class="inp" type="text" id="sName" placeholder="e.g., Akshit" required autofocus />
                <div class="field-err">Please enter your name</div>
            </div>

            <div class="form-group">
                <label class="lbl" for="sPid">PID Number</label>
                <input class="inp" type="text" id="sPid" placeholder="e.g., 25MSRSGIS001" required />
                <div class="field-err">Please enter your PID</div>
            </div>

            <div class="form-group">
                <label class="lbl" for="sCourse">Program</label>
                <input class="inp" type="text" id="sCourse" placeholder="e.g., M.Sc. Remote Sensing & GIS" required />
                <div class="field-err">Please enter your program</div>
            </div>

            <button class="btn" type="submit" id="btnGo">
                <span class="btn-t">Generate Assignment</span>
                <div class="sp"></div>
            </button>

        </form>
    </div>

    <!-- Result -->
    <div class="result" id="result">
        <div class="msg-ok" id="msgOk">
            ✓ Generated for <strong id="dName"></strong>
            <span class="det" id="dDet"></span>
        </div>
        <div class="msg-err" id="msgErr"></div>

        <div class="actions">
            <a class="dl-btn" id="dlPdf" href="#" download>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download PDF
            </a>
        </div>

        <div class="preview-box">
            <div class="preview-bar">
                <span>📋 Preview</span>
                <span class="badge">Live PDF</span>
            </div>
            <div class="gen-loading" id="genLoad">
                <div class="ring"></div>
                <p>Generating your assignment...</p>
            </div>
            <iframe class="pdf-iframe" id="pdfFrame"></iframe>
        </div>
    </div>

    <!-- Signature Removed from bottom -->

</div>

<script>
// ══════════════════════════════════════════════════════════════════════
// THREE.JS — FIBONACCI / HEXAGONAL WAVEFORM IN SPACE
// Reactive to mouse and touch
// ══════════════════════════════════════════════════════════════════════
(function () {
    const canvas = document.getElementById('waveCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 55, 95);
    camera.lookAt(0, 0, 0);

    // ── Mouse / Touch ────────────────────────────────────────────
    let mx = 0, my = 0, tmx = 0, tmy = 0;
    let ripple = { x: 0, y: 0, str: 0 };

    document.addEventListener('mousemove', e => {
        tmx = (e.clientX / window.innerWidth  - 0.5) * 2;
        tmy = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    function onTap(cx, cy) {
        ripple.x = (cx / window.innerWidth  - 0.5) * 2;
        ripple.y = (cy / window.innerHeight - 0.5) * 2;
        ripple.str = 1.0;
    }

    canvas.addEventListener('mousedown', e => onTap(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
        if (e.touches.length) onTap(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    // ── Wave Plane (with Fibonacci + Hex shader) ─────────────────
    const SEG = 180;
    const planeGeo = new THREE.PlaneGeometry(220, 220, SEG, SEG);
    planeGeo.rotateX(-Math.PI / 2);

    const planeMat = new THREE.ShaderMaterial({
        uniforms: {
            uT:     { value: 0 },
            uMouse: { value: new THREE.Vector2(0, 0) },
            uRipple:{ value: new THREE.Vector3(0, 0, 0) }
        },
        vertexShader: /* glsl */`
            uniform float uT;
            uniform vec2  uMouse;
            uniform vec3  uRipple;

            varying float vH;
            varying vec2  vUv;

            // Fibonacci / golden-angle hex tiling helper
            float hex(vec2 p) {
                p = abs(p);
                return max(dot(p, normalize(vec2(1.0, 1.73))), p.x);
            }

            void main() {
                vec3 pos = position;
                float x = pos.x * 0.05;
                float z = pos.z * 0.05;

                // Sound wave layers
                float w1 = sin(x * 2.1 + uT * 0.7) * 3.2;
                float w2 = sin(z * 1.8 + uT * 0.55) * 2.8;
                float w3 = sin((x + z) * 1.4 + uT * 1.1) * 2.0;
                float w4 = cos(x * 3.2 - uT * 0.9) * sin(z * 2.6 + uT * 0.6) * 1.4;

                // Fibonacci shell spiral
                float r = length(vec2(x, z));
                float phi = atan(z, x);
                float fib = sin(r * 6.28 - phi * 2.618 + uT * 0.4) * 1.8;

                // Hexagonal standing wave
                vec2 hexUv = vec2(x, z) * 3.5;
                float hx = hex(fract(hexUv) - 0.5);
                float hexWave = sin(hx * 8.0 + uT * 1.3) * 0.9;

                // Mouse influence
                vec2 mpos = uMouse * 110.0;
                float md = length(vec2(pos.x - mpos.x, pos.z - mpos.y));
                float mWave = sin(md * 0.08 - uT * 2.2) * exp(-md * 0.012) * 5.5;

                // Touch ripple
                vec2 rpos = vec2(uRipple.x, uRipple.y) * 110.0;
                float rd = length(vec2(pos.x - rpos.x, pos.z - rpos.y));
                float rWave = sin(rd * 0.12 - uT * 5.0) * exp(-rd * 0.018) * 9.0 * uRipple.z;

                pos.y = w1 + w2 + w3 + w4 + fib + hexWave + mWave + rWave;
                vH = pos.y;
                vUv = uv;

                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `,
        fragmentShader: /* glsl */`
            uniform float uT;
            varying float vH;
            varying vec2  vUv;

            void main() {
                // Deep space palette: indigo → violet → cyan tips
                float t = clamp((vH + 10.0) / 20.0, 0.0, 1.0);
                vec3 col1 = vec3(0.12, 0.12, 0.38);   // deep indigo
                vec3 col2 = vec3(0.38, 0.28, 0.75);   // violet
                vec3 col3 = vec3(0.55, 0.85, 1.0);    // cyan glow at peaks

                vec3 col = mix(col1, col2, smoothstep(0.0, 0.55, t));
                col = mix(col, col3, smoothstep(0.72, 1.0, t));

                // Hex grid overlay for structural feel
                vec2 hg = fract(vUv * 38.0) - 0.5;
                float gridLine = 1.0 - smoothstep(0.0, 0.03,
                    min(abs(hg.x), min(abs(hg.y), abs(hg.x + hg.y))));
                col += gridLine * vec3(0.2, 0.25, 0.6) * 0.18;

                // Glow at peaks
                float glow = smoothstep(4.0, 9.0, abs(vH));
                col += vec3(0.3, 0.25, 0.7) * glow * 0.4;

                float alpha = 0.18 + glow * 0.35 + gridLine * 0.08;
                gl_FragColor = vec4(col, alpha);
            }
        `,
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false
    });

    const planeMesh = new THREE.Mesh(planeGeo, planeMat);
    planeMesh.position.y = -18;
    scene.add(planeMesh);

    // Wireframe twin for structure
    const wireMat = new THREE.ShaderMaterial({
        uniforms: planeMat.uniforms,
        vertexShader: planeMat.vertexShader,
        fragmentShader: `
            uniform float uT;
            varying float vH;
            varying vec2  vUv;
            void main() {
                float glow = smoothstep(2.0, 9.0, abs(vH));
                float a = 0.05 + glow * 0.15;
                gl_FragColor = vec4(0.6, 0.55, 1.0, a);
            }
        `,
        transparent: true,
        wireframe: true,
        depthWrite: false
    });
    const wireMesh = new THREE.Mesh(planeGeo.clone(), wireMat);
    wireMesh.position.copy(planeMesh.position);
    scene.add(wireMesh);

    // ── Floating geometric shapes (Hex + Pentagon particles) ─────
    const SHAPES = [];
    const shapeCols = [0x6366f1, 0x818cf8, 0xa78bfa, 0xc4b5fd, 0x38bdf8, 0x7c3aed];

    function makeHexGeo(r) {
        const pts = [];
        for (let i = 0; i < 6; i++) {
            const a = (Math.PI / 3) * i;
            pts.push(new THREE.Vector2(Math.cos(a) * r, Math.sin(a) * r));
        }
        return new THREE.LatheGeometry([new THREE.Vector2(r, 0), new THREE.Vector2(r * 0.85, r * 0.15)], 6);
    }

    function makePentGeo(r) {
        const geo = new THREE.CylinderGeometry(r, r, r * 0.08, 5);
        return geo;
    }

    for (let i = 0; i < 30; i++) {
        const isHex = Math.random() > 0.45;
        const r = Math.random() * 1.2 + 0.3;
        const geo = isHex
            ? new THREE.CylinderGeometry(r, r, r * 0.06, 6, 1)
            : new THREE.CylinderGeometry(r, r, r * 0.06, 5, 1);

        const col = shapeCols[Math.floor(Math.random() * shapeCols.length)];
        const mat = new THREE.MeshBasicMaterial({
            color: col,
            transparent: true,
            opacity: 0.12 + Math.random() * 0.18,
            wireframe: Math.random() > 0.4
        });

        const mesh = new THREE.Mesh(geo, mat);
        const angle = Math.random() * Math.PI * 2;
        const dist  = Math.random() * 180 + 40;
        mesh.position.set(
            Math.cos(angle) * dist,
            (Math.random() - 0.5) * 80,
            Math.sin(angle) * dist
        );
        mesh.rotation.set(
            Math.random() * Math.PI,
            Math.random() * Math.PI,
            Math.random() * Math.PI
        );

        mesh.userData = {
            ry: (Math.random() - 0.5) * 0.008,
            rx: (Math.random() - 0.5) * 0.004,
            fy: Math.random() * 0.002 + 0.0005,
            fa: Math.random() * Math.PI * 2,
            by: mesh.position.y
        };

        scene.add(mesh);
        SHAPES.push(mesh);
    }

    // ── Stars (space dust) ───────────────────────────────────────
    const starCount = 2000;
    const sGeo = new THREE.BufferGeometry();
    const sPos = new Float32Array(starCount * 3);
    const sCol = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount; i++) {
        const phi   = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        const dist  = Math.random() * 700 + 100;
        sPos[i*3]   = dist * Math.sin(phi) * Math.cos(theta);
        sPos[i*3+1] = dist * Math.cos(phi);
        sPos[i*3+2] = dist * Math.sin(phi) * Math.sin(theta);

        const t = Math.random();
        sCol[i*3]   = 0.5 + t * 0.4;
        sCol[i*3+1] = 0.5 + t * 0.3;
        sCol[i*3+2] = 0.8 + t * 0.2;
    }

    sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
    sGeo.setAttribute('color',    new THREE.BufferAttribute(sCol, 3));

    const sMat = new THREE.PointsMaterial({
        size: 0.7,
        vertexColors: true,
        transparent: true,
        opacity: 0.6,
        sizeAttenuation: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    scene.add(new THREE.Points(sGeo, sMat));

    // ── Animate ──────────────────────────────────────────────────
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        mx += (tmx - mx) * 0.04;
        my += (tmy - my) * 0.04;
        ripple.str *= 0.984;

        planeMat.uniforms.uT.value     = t;
        planeMat.uniforms.uMouse.value.set(mx, my);
        planeMat.uniforms.uRipple.value.set(ripple.x, ripple.y, ripple.str);

        wireMat.uniforms.uT.value      = t;
        wireMat.uniforms.uMouse.value.copy(planeMat.uniforms.uMouse.value);
        wireMat.uniforms.uRipple.value.copy(planeMat.uniforms.uRipple.value);

        SHAPES.forEach(s => {
            s.rotation.y += s.userData.ry;
            s.rotation.x += s.userData.rx;
            s.position.y  = s.userData.by + Math.sin(t * s.userData.fy + s.userData.fa) * 4;
        });

        camera.position.x += (mx * 10 - camera.position.x) * 0.02;
        camera.position.y += (55 - my * 6 - camera.position.y) * 0.02;
        camera.lookAt(0, -5, 0);

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
})();

// ══════════════════════════════════════════════════════════════════════
// HEAT WAVE DISPLACEMENT ENGINE & TYPEWRITER TAGLINE
// ══════════════════════════════════════════════════════════════════════
const displacement = document.getElementById('displacement');
const tagTextEl = document.getElementById('tagText');
const fullTagline = "Together, no one walks alone";

let loopState = 'TYPING';
let typeIndex = 0;

function animateDistortion(startDist, endDist, duration, callback) {
    const startTime = performance.now();
    
    function step(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // Easing out sine
        const ease = Math.sin((progress * Math.PI) / 2);
        const currDist = startDist + (endDist - startDist) * ease;
        
        displacement.setAttribute('scale', currDist);
        
        if (progress < 1) {
            requestAnimationFrame(step);
        } else {
            if (callback) callback();
        }
    }
    requestAnimationFrame(step);
}

function animateLoop() {
    if (loopState === 'TYPING') {
        typeIndex++;
        tagTextEl.innerText = fullTagline.slice(0, typeIndex);
        
        if (typeIndex >= fullTagline.length) {
            loopState = 'FORMED';
            setTimeout(animateLoop, 1500); // Read time before bursting
        } else {
            setTimeout(animateLoop, 40 + Math.random() * 50); // Typewriter speed
        }
    } else if (loopState === 'FORMED') {
        loopState = 'BURSTING';
        // Melt away with heavy distortion
        animateDistortion(0, 150, 1000, () => {
            loopState = 'DISPERSED';
            setTimeout(animateLoop, 800); // Float in distortion
        });
    } else if (loopState === 'DISPERSED') {
        loopState = 'REFORMING';
        // Reform back to perfect legibility
        animateDistortion(150, 0, 1000, () => {
            loopState = 'HIDDEN';
            setTimeout(animateLoop, 200); // Pause briefly once formed
        });
    } else if (loopState === 'HIDDEN') {
        // Tagline vanishes, signature stays visible
        tagTextEl.innerText = "";
        typeIndex = 0;
        loopState = 'TYPING';
        setTimeout(animateLoop, 400); // Wait before starting typing again
    }
}

// Start loop
setTimeout(animateLoop, 800);

// ══════════════════════════════════════════════════════════════════════
// LOCAL STORAGE
// ══════════════════════════════════════════════════════════════════════
const SK = 'ads_v3';
const nI = document.getElementById('sName');
const pI = document.getElementById('sPid');
const cI = document.getElementById('sCourse');

function save() {
    try { localStorage.setItem(SK, JSON.stringify({ n: nI.value, p: pI.value, c: cI.value })); } catch(e) {}
}
function load() {
    try {
        const d = JSON.parse(localStorage.getItem(SK) || '{}');
        if (d.n) nI.value = d.n;
        if (d.p) pI.value = d.p;
        if (d.c) cI.value = d.c;
    } catch(e) {}
}

[nI, pI, cI].forEach(el => el.addEventListener('input', () => { el.classList.remove('err'); save(); }));
load();

// ══════════════════════════════════════════════════════════════════════
// FORM SUBMIT
// ══════════════════════════════════════════════════════════════════════
const form    = document.getElementById('form');
const btnGo   = document.getElementById('btnGo');
const result  = document.getElementById('result');
const msgOk   = document.getElementById('msgOk');
const msgErr  = document.getElementById('msgErr');
const dName   = document.getElementById('dName');
const dDet    = document.getElementById('dDet');
const dlPdf   = document.getElementById('dlPdf');
const genLoad = document.getElementById('genLoad');
const pdfFrame= document.getElementById('pdfFrame');

function showErr(msg) {
    msgErr.textContent = msg;
    msgErr.classList.add('show');
    genLoad.classList.remove('show');
    result.classList.add('show');
    result.scrollIntoView({ behavior: 'smooth' });
}

function validate() {
    let ok = true;
    [nI, pI, cI].forEach(el => el.classList.remove('err'));
    if (!nI.value.trim()) { nI.classList.add('err'); ok = false; }
    if (!pI.value.trim()) { pI.classList.add('err'); ok = false; }
    if (!cI.value.trim()) { cI.classList.add('err'); ok = false; }
    return ok;
}

form.addEventListener('submit', async e => {
    e.preventDefault();
    msgOk.classList.remove('show');
    msgErr.classList.remove('show');
    if (!validate()) return;

    btnGo.classList.add('ld');
    btnGo.disabled = true;
    pdfFrame.style.display = 'none';
    genLoad.classList.add('show');
    result.classList.add('show');
    result.scrollIntoView({ behavior: 'smooth' });

    try {
        const res  = await fetch('/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                studentName:   nI.value.trim(),
                studentPid:    pI.value.trim(),
                studentCourse: cI.value.trim()
            })
        });
        const data = await res.json();

        if (!data.success) { showErr(data.error || 'Generation failed.'); return; }

        dName.textContent = data.studentName;
        dDet.textContent  = `PID: ${data.studentPid}  ·  ${data.studentCourse}`;
        msgOk.classList.add('show');

        if (data.pdfReady) {
            dlPdf.href             = data.pdfUrl;
            dlPdf.style.display    = 'flex';
            pdfFrame.src           = data.previewUrl;
            pdfFrame.style.display = 'block';
        } else {
            dlPdf.style.display = 'none';
            showErr('PDF could not be generated — check server logs.');
        }

        genLoad.classList.remove('show');

    } catch (err) {
        showErr('Network error. Please check the server.');
    } finally {
        btnGo.classList.remove('ld');
        btnGo.disabled = false;
    }
});
</script>
