<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADS — Assignment Document System</title>
    <meta name="description" content="Generate your personalized stats assignment with one click. Just enter your details.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* ═══════════════════════════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            background: #050510;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        /* ═══════════════════════════════════════════════════════════════
           THREE.JS CANVAS
           ═══════════════════════════════════════════════════════════════ */
        #waveCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* ═══════════════════════════════════════════════════════════════
           CONTENT LAYOUT
           ═══════════════════════════════════════════════════════════════ */
        .content-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem 4rem;
        }

        /* ═══════════════════════════════════════════════════════════════
           HEADER — Handwritten stylus title
           ═══════════════════════════════════════════════════════════════ */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.2rem, 6vw, 4.2rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            line-height: 1.2;
            background: linear-gradient(135deg, #c4b5fd, #818cf8, #a78bfa, #e0e7ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerTitle 6s ease infinite;
            text-shadow: none;
        }

        @keyframes shimmerTitle {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 0.6rem;
        }

        /* ═══════════════════════════════════════════════════════════════
           GLASS CARD
           ═══════════════════════════════════════════════════════════════ */
        .glass-card {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 2.25rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
            width: 100%;
            max-width: 480px;
            transition: border-color 0.4s, box-shadow 0.4s, transform 0.4s;
        }

        .glass-card:hover {
            border-color: rgba(167,139,250,0.2);
            box-shadow: 0 12px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            transform: translateY(-2px);
        }

        /* ═══════════════════════════════════════════════════════════════
           FORM
           ═══════════════════════════════════════════════════════════════ */
        .form-group { margin-bottom: 1.4rem; }

        .form-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 0.45rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder { color: rgba(255,255,255,0.18); }

        .form-input:focus {
            border-color: rgba(167,139,250,0.5);
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
        }

        .form-input.error {
            border-color: #f87171;
            box-shadow: 0 0 0 3px rgba(248,113,113,0.1);
        }

        .form-error {
            font-size: 0.75rem;
            color: #f87171;
            margin-top: 0.3rem;
            display: none;
        }

        .form-input.error ~ .form-error { display: block; }

        /* ═══════════════════════════════════════════════════════════════
           SUBMIT BUTTON
           ═══════════════════════════════════════════════════════════════ */
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #7c3aed, #6366f1, #818cf8);
            background-size: 200% 200%;
            animation: btnGradient 4s ease infinite;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        @keyframes btnGradient {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(124,58,237,0.35);
        }

        .btn-submit:active { transform: translateY(0) scale(0.98); }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-submit .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .spinner  { display: block; }

        /* ═══════════════════════════════════════════════════════════════
           RESULT SECTION
           ═══════════════════════════════════════════════════════════════ */
        .result-section {
            width: 100%;
            max-width: 900px;
            margin-top: 2.5rem;
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }
        .result-section.visible { display: block; }

        /* Success */
        .success-message {
            text-align: center;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            background: rgba(129,140,248,0.08);
            border: 1px solid rgba(129,140,248,0.15);
            border-radius: 14px;
            font-size: 0.88rem;
            color: rgba(255,255,255,0.85);
            display: none;
            line-height: 1.5;
        }
        .success-message.visible { display: block; }
        .success-message .check { color: #a78bfa; font-weight: 600; }
        .success-message strong { color: #fff; font-weight: 600; }
        .success-message .detail { color: rgba(255,255,255,0.45); font-size: 0.8rem; display: block; margin-top: 0.2rem; }

        /* Error */
        .error-message {
            text-align: center;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.15);
            border-radius: 14px;
            font-size: 0.88rem;
            color: #f87171;
            display: none;
        }
        .error-message.visible { display: block; }

        /* Download Button */
        .result-actions {
            display: flex;
            justify-content: center;
            margin-bottom: 1.25rem;
        }

        .btn-download {
            padding: 0.75rem 2rem;
            border: 1.5px solid rgba(167,139,250,0.25);
            border-radius: 12px;
            background: rgba(167,139,250,0.08);
            backdrop-filter: blur(10px);
            color: #e0e7ff;
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-download:hover {
            background: rgba(167,139,250,0.15);
            border-color: rgba(167,139,250,0.4);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(167,139,250,0.15);
        }

        .btn-download .icon { font-size: 1.1rem; }

        /* ═══════════════════════════════════════════════════════════════
           PDF PREVIEW (IFRAME)
           ═══════════════════════════════════════════════════════════════ */
        .preview-wrapper {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .preview-header {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            padding: 0.75rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .preview-header span {
            color: rgba(255,255,255,0.7);
            font-weight: 500;
            font-size: 0.82rem;
        }

        .preview-header .badge {
            background: rgba(167,139,250,0.15);
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            color: rgba(167,139,250,0.8);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .pdf-frame {
            width: 100%;
            height: 700px;
            border: none;
            background: #1a1a2e;
        }

        /* Loading */
        .preview-loading {
            display: none;
            padding: 4rem;
            text-align: center;
            background: rgba(255,255,255,0.02);
        }
        .preview-loading.visible { display: block; }
        .preview-loading .pulse {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: #a78bfa;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 0.75rem;
        }
        .preview-loading span { color: rgba(255,255,255,0.35); font-size: 0.82rem; }

        /* ═══════════════════════════════════════════════════════════════
           ANIMATIONS
           ═══════════════════════════════════════════════════════════════ */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ═══════════════════════════════════════════════════════════════
           SCROLLBAR
           ═══════════════════════════════════════════════════════════════ */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

        /* ═══════════════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════════════ */
        @media (max-width: 640px) {
            .content-wrapper { padding: 1.5rem 1rem 3rem; }
            .glass-card { padding: 1.5rem; border-radius: 16px; }
            .pdf-frame { height: 450px; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 2rem; }
            .glass-card { padding: 1.25rem; }
        }

        @media print {
            #waveCanvas, .btn-submit, .btn-download, .result-actions,
            .preview-header, .header, .glass-card, .success-message,
            .error-message { display: none !important; }
            .preview-wrapper { box-shadow: none; border: none; }
            .pdf-frame { height: auto; }
        }
    </style>
</head>
<body>
    <canvas id="waveCanvas"></canvas>

    <div class="content-wrapper">
        <!-- Header -->
        <div class="header">
            <h1>ADS Assignment<br>Document System</h1>
            <p class="subtitle">Enter your details · Preview · Download</p>
        </div>

        <!-- Form -->
        <div class="glass-card" id="formCard">
            <form id="assignmentForm" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="studentName">Full Name</label>
                    <input type="text" id="studentName" class="form-input" placeholder="e.g., John Doe" required autofocus />
                    <div class="form-error">Please enter your full name</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="studentPid">PID Number</label>
                    <input type="text" id="studentPid" class="form-input" placeholder="e.g., 25MSRSGIS002" required />
                    <div class="form-error">Please enter your PID number</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="studentCourse">Program</label>
                    <input type="text" id="studentCourse" class="form-input" placeholder="e.g., M.Sc. Remote Sensing & GIS" required />
                    <div class="form-error">Please enter your program name</div>
                </div>

                <button type="submit" class="btn-submit" id="btnSubmit">
                    <span class="btn-text">Generate Assignment</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>

        <!-- Result Section -->
        <div class="result-section" id="resultSection">
            <div class="success-message" id="successMessage">
                <span class="check">✓</span> Assignment generated for
                <strong id="displayName"></strong>
                <span class="detail" id="displayDetails"></span>
            </div>
            <div class="error-message" id="errorMessage"></div>

            <div class="result-actions">
                <a class="btn-download" id="downloadPdf" href="#" download>
                    <span class="icon">📄</span>
                    Download PDF
                </a>
            </div>

            <div class="preview-wrapper">
                <div class="preview-header">
                    <span>📋 Document Preview</span>
                    <span class="badge">Live</span>
                </div>
                <div class="preview-loading" id="previewLoading">
                    <div class="pulse"></div>
                    <span>Generating your assignment...</span>
                </div>
                <iframe class="pdf-frame" id="pdfFrame" style="display:none;"></iframe>
            </div>
        </div>
    </div>

    <script>
    // ═══════════════════════════════════════════════════════════════════════
    // THREE.JS — 3D SOUND WAVES IN SPACE (Interactive)
    // ═══════════════════════════════════════════════════════════════════════
    (function initWaves() {
        const canvas = document.getElementById('waveCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 30, 80);
        camera.lookAt(0, 0, 0);

        // Mouse tracking
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let touchInfluence = { x: 0, y: 0, strength: 0 };

        document.addEventListener('mousemove', (e) => {
            targetMouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            targetMouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        // Touch/click interaction — creates a ripple in the waves
        function onInteract(clientX, clientY) {
            touchInfluence.x = (clientX / window.innerWidth - 0.5) * 2;
            touchInfluence.y = (clientY / window.innerHeight - 0.5) * 2;
            touchInfluence.strength = 1.0;
        }

        canvas.addEventListener('mousedown', (e) => onInteract(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) onInteract(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        // ─── Wave Plane ─────────────────────────────────────────────────
        const WAVE_SEG_X = 200;
        const WAVE_SEG_Z = 200;
        const waveGeo = new THREE.PlaneGeometry(200, 200, WAVE_SEG_X, WAVE_SEG_Z);
        waveGeo.rotateX(-Math.PI / 2);

        const waveMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0.0 },
                uMouse: { value: new THREE.Vector2(0, 0) },
                uTouch: { value: new THREE.Vector3(0, 0, 0) },
                uColor1: { value: new THREE.Color(0x6366f1) },
                uColor2: { value: new THREE.Color(0xa78bfa) },
                uColor3: { value: new THREE.Color(0x818cf8) }
            },
            vertexShader: `
                uniform float uTime;
                uniform vec2 uMouse;
                uniform vec3 uTouch;
                varying float vHeight;
                varying vec2 vUv;

                void main() {
                    vec3 pos = position;
                    float x = pos.x;
                    float z = pos.z;

                    // Multiple wave layers (sound wave propagation)
                    float wave1 = sin(x * 0.08 + uTime * 0.8) * 3.0;
                    float wave2 = sin(z * 0.06 + uTime * 0.6) * 2.5;
                    float wave3 = sin((x + z) * 0.05 + uTime * 1.2) * 2.0;
                    float wave4 = cos(x * 0.12 - uTime * 0.4) * sin(z * 0.1 + uTime * 0.7) * 1.5;

                    // Mouse influence — waves react to cursor position
                    float mx = uMouse.x * 100.0;
                    float mz = uMouse.y * 100.0;
                    float mouseDist = length(vec2(x - mx, z - mz));
                    float mouseWave = sin(mouseDist * 0.1 - uTime * 2.0) * exp(-mouseDist * 0.015) * 5.0;

                    // Touch ripple
                    float tx = uTouch.x * 100.0;
                    float tz = uTouch.y * 100.0;
                    float touchStr = uTouch.z;
                    float touchDist = length(vec2(x - tx, z - tz));
                    float touchWave = sin(touchDist * 0.15 - uTime * 4.0) * exp(-touchDist * 0.02) * 8.0 * touchStr;

                    pos.y = wave1 + wave2 + wave3 + wave4 + mouseWave + touchWave;
                    vHeight = pos.y;
                    vUv = uv;

                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform vec3 uColor1;
                uniform vec3 uColor2;
                uniform vec3 uColor3;
                uniform float uTime;
                varying float vHeight;
                varying vec2 vUv;

                void main() {
                    // Color based on wave height
                    float t = (vHeight + 8.0) / 16.0;
                    vec3 color = mix(uColor1, uColor2, smoothstep(0.0, 0.5, t));
                    color = mix(color, uColor3, smoothstep(0.5, 1.0, t));

                    // Subtle grid lines for depth
                    float gridX = abs(fract(vUv.x * 40.0) - 0.5) * 2.0;
                    float gridZ = abs(fract(vUv.y * 40.0) - 0.5) * 2.0;
                    float grid = max(
                        smoothstep(0.96, 1.0, gridX),
                        smoothstep(0.96, 1.0, gridZ)
                    );

                    color += grid * 0.15;

                    // Opacity based on height — peaks glow
                    float alpha = 0.25 + smoothstep(0.0, 8.0, abs(vHeight)) * 0.4;
                    alpha += grid * 0.1;

                    gl_FragColor = vec4(color, alpha);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide,
            wireframe: false,
            depthWrite: false
        });

        const waveMesh = new THREE.Mesh(waveGeo, waveMat);
        waveMesh.position.y = -15;
        scene.add(waveMesh);

        // ─── Wireframe overlay for depth perception ─────────────────────
        const wireMat = new THREE.ShaderMaterial({
            uniforms: waveMat.uniforms,
            vertexShader: waveMat.vertexShader,
            fragmentShader: `
                uniform float uTime;
                varying float vHeight;
                varying vec2 vUv;
                void main() {
                    float alpha = 0.06 + smoothstep(2.0, 8.0, abs(vHeight)) * 0.12;
                    gl_FragColor = vec4(0.7, 0.6, 1.0, alpha);
                }
            `,
            transparent: true,
            wireframe: true,
            depthWrite: false
        });

        const wireMesh = new THREE.Mesh(waveGeo.clone(), wireMat);
        wireMesh.rotation.x = -Math.PI / 2;
        // Share the vertex shader behavior
        wireMesh.position.copy(waveMesh.position);
        scene.add(wireMesh);

        // ─── Floating particles (atoms/stars in space) ──────────────────
        const particleCount = 1500;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            positions[i * 3]     = (Math.random() - 0.5) * 300;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 150;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 300;

            const t = Math.random();
            if (t < 0.33) {
                colors[i*3] = 0.39; colors[i*3+1] = 0.4; colors[i*3+2] = 0.95; // indigo
            } else if (t < 0.66) {
                colors[i*3] = 0.65; colors[i*3+1] = 0.55; colors[i*3+2] = 0.98; // purple
            } else {
                colors[i*3] = 0.5; colors[i*3+1] = 0.55; colors[i*3+2] = 0.97; // blue
            }

            sizes[i] = Math.random() * 1.5 + 0.3;
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const particleMat = new THREE.PointsMaterial({
            size: 0.8,
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            sizeAttenuation: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // ─── Ambient light ──────────────────────────────────────────────
        scene.add(new THREE.AmbientLight(0x6366f1, 0.3));

        // ─── Animation Loop ─────────────────────────────────────────────
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            // Smooth mouse
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;

            // Decay touch influence
            touchInfluence.strength *= 0.985;
            if (touchInfluence.strength < 0.001) touchInfluence.strength = 0;

            // Update uniforms
            waveMat.uniforms.uTime.value = elapsed;
            waveMat.uniforms.uMouse.value.set(mouseX, mouseY);
            waveMat.uniforms.uTouch.value.set(
                touchInfluence.x,
                touchInfluence.y,
                touchInfluence.strength
            );

            // Sync wireframe uniforms
            wireMat.uniforms.uTime.value = elapsed;
            wireMat.uniforms.uMouse.value.copy(waveMat.uniforms.uMouse.value);
            wireMat.uniforms.uTouch.value.copy(waveMat.uniforms.uTouch.value);

            // Particle drift
            const posArr = particleGeo.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                posArr[i * 3 + 1] += Math.sin(elapsed * 0.3 + i) * 0.008;
                posArr[i * 3] += Math.cos(elapsed * 0.2 + i * 0.7) * 0.005;
            }
            particleGeo.attributes.position.needsUpdate = true;

            // Camera subtle sway
            camera.position.x += (mouseX * 12 - camera.position.x) * 0.02;
            camera.position.y += (30 - mouseY * 8 - camera.position.y) * 0.02;
            camera.lookAt(0, -5, 0);

            // Rotate particles slowly
            particles.rotation.y = elapsed * 0.02;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    })();

    // ═══════════════════════════════════════════════════════════════════════
    // LOCAL STORAGE AUTOSAVE
    // ═══════════════════════════════════════════════════════════════════════
    const STORAGE_KEY = 'ads_assignment_form';

    function loadFromStorage() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (data.studentName)   nameInput.value   = data.studentName;
                if (data.studentPid)    pidInput.value    = data.studentPid;
                if (data.studentCourse) courseInput.value  = data.studentCourse;
            }
        } catch (e) {}
    }

    function saveToStorage() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                studentName: nameInput.value.trim(),
                studentPid: pidInput.value.trim(),
                studentCourse: courseInput.value.trim()
            }));
        } catch (e) {}
    }

    // ═══════════════════════════════════════════════════════════════════════
    // FORM & API
    // ═══════════════════════════════════════════════════════════════════════
    const form          = document.getElementById('assignmentForm');
    const btnSubmit     = document.getElementById('btnSubmit');
    const nameInput     = document.getElementById('studentName');
    const pidInput      = document.getElementById('studentPid');
    const courseInput    = document.getElementById('studentCourse');
    const resultSection = document.getElementById('resultSection');
    const previewLoading= document.getElementById('previewLoading');
    const pdfFrame      = document.getElementById('pdfFrame');
    const downloadPdf   = document.getElementById('downloadPdf');
    const successMessage= document.getElementById('successMessage');
    const displayName   = document.getElementById('displayName');
    const displayDetails= document.getElementById('displayDetails');
    const errorMessage  = document.getElementById('errorMessage');

    function validateInputs() {
        let valid = true;
        [nameInput, pidInput, courseInput].forEach(inp => inp.classList.remove('error'));
        if (!nameInput.value.trim())  { nameInput.classList.add('error');  valid = false; }
        if (!pidInput.value.trim())   { pidInput.classList.add('error');   valid = false; }
        if (!courseInput.value.trim()) { courseInput.classList.add('error'); valid = false; }
        return valid;
    }

    nameInput.addEventListener('input',   () => { nameInput.classList.remove('error');   saveToStorage(); });
    pidInput.addEventListener('input',    () => { pidInput.classList.remove('error');    saveToStorage(); });
    courseInput.addEventListener('input',  () => { courseInput.classList.remove('error');  saveToStorage(); });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMessage.classList.remove('visible');
        successMessage.classList.remove('visible');

        if (!validateInputs()) return;

        btnSubmit.classList.add('loading');
        btnSubmit.disabled = true;
        resultSection.classList.remove('visible');
        pdfFrame.style.display = 'none';
        previewLoading.classList.add('visible');

        try {
            const response = await fetch('/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    studentName:  nameInput.value.trim(),
                    studentPid:   pidInput.value.trim(),
                    studentCourse: courseInput.value.trim()
                })
            });

            const data = await response.json();

            if (!data.success) {
                showError(data.error || 'Failed to generate assignment.');
                return;
            }

            displayName.textContent = data.studentName;
            displayDetails.textContent = `PID: ${data.studentPid} · Program: ${data.studentCourse}`;
            successMessage.classList.add('visible');

            if (data.pdfReady && data.pdfUrl) {
                downloadPdf.href = data.pdfUrl;
                downloadPdf.style.display = 'flex';

                // Show PDF preview in iframe
                pdfFrame.src = data.previewUrl;
                pdfFrame.style.display = 'block';
            } else {
                downloadPdf.style.display = 'none';
                showError('PDF could not be generated. Please check the server logs.');
            }

            previewLoading.classList.remove('visible');
            resultSection.classList.add('visible');
            resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

        } catch (err) {
            showError('Network error. Please ensure the server is running.');
            previewLoading.classList.remove('visible');
        } finally {
            btnSubmit.classList.remove('loading');
            btnSubmit.disabled = false;
        }
    });

    function showError(msg) {
        errorMessage.textContent = msg;
        errorMessage.classList.add('visible');
        previewLoading.classList.remove('visible');
        resultSection.classList.add('visible');
        resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Initialize
    loadFromStorage();
    </script>
</body>
</html>
